<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha Mágico</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <svg class="cadeado-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>
        
        <div class="conteudo-senha">
            <label for="senha">Senha Gerada</label>
            <div class="senha-container">
                <input name="senha" type="text" id="campo-senha" readonly>
                <button id="btn-copiar" title="Copiar Senha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
        </div>
        
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao" id="btn-menos">-</button>
                        <p class="parametro-senha__texto" id="tamanho-texto">12</p>
                        <button class="parametro-senha__botao" id="btn-mais">+</button>
                    </div>
                </div>               
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Características</h4>
                    <div class="opcoes-checkbox">
                        <label><input type="checkbox" id="chk-maiusculas" checked> Maiúsculas (A-Z)</label>
                        <label><input type="checkbox" id="chk-minusculas" checked> Minúsculas (a-z)</label>
                        <label><input type="checkbox" id="chk-numeros" checked> Números (0-9)</label>
                        <label><input type="checkbox" id="chk-simbolos" checked> Símbolos (!@#$)</label>
                    </div>
                </div>
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Força da senha</h4>
                    <div class="forca-container">
                        <div id="barra-forca" class="forca-media"></div>
                        <p id="texto-forca">Média</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="scripts.js"></script>
</body>

</html>
